spring.application.name=validationservice

# Razorpay Configuration
razorpay.base-url=https://api.razorpay.com
razorpay.api-key=${RAZORPAY_KEY}
razorpay.api-secret=${RAZORPAY_SECRET}
razorpay.webhook-secret=${WEBHOOK_SECRET}
razorpay.source-account-number=4564567428167673
razorpay.validation-type=optimized


#DataBase configuation
spring.datasource.url=jdbc:mysql://localhost:3306/validation_service
spring.datasource.username=venky
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.type.preferred_uuid_jdbc_type=CHAR

#Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

#Logging
# Sets the logging level
# 1. Keep Spring Boot's internal chatter quiet
logging.level.root=INFO
logging.level.com.venky.validationservice=DEBUG
logging.file.name=validation-service.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
